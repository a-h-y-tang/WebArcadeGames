<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Air Hockey</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container">
        <h1>Air Hockey</h1>
        <div id="hud">
            <span>You: <strong id="score-player">0</strong></span>
            <span>CPU: <strong id="score-cpu">0</strong></span>
            <span>Wins: <strong id="wins">0</strong></span>
        </div>
        <div id="canvas-wrapper">
            <canvas id="canvas" width="460" height="700"></canvas>
            <div id="overlay" class="visible">
                <p id="overlay-title">Air Hockey</p>
                <p id="overlay-score"></p>
                <p id="overlay-sub">Move your mallet with the mouse or ← → ↑ ↓ · first to 7 wins</p>
                <button id="btn-start">Start Game</button>
            </div>
        </div>
        <p id="controls-hint">← → ↑ ↓ / W A S D or mouse &nbsp;·&nbsp; P to pause</p>
    </div>
    <script src="game.js"></script>
</body>
</html>
