<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gem Crush</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container">
        <h1>Gem Crush</h1>
        <div id="hud">
            <span>Score: <strong id="score">0</strong></span>
            <span>Best: <strong id="best">0</strong></span>
        </div>
        <div id="canvas-wrapper">
            <canvas id="canvas" width="480" height="480"></canvas>
            <div id="overlay" class="visible">
                <p id="overlay-title">Gem Crush</p>
                <p id="overlay-score"></p>
                <p id="overlay-sub">Swap adjacent gems to line up three or more</p>
                <button id="btn-start">Start Game</button>
            </div>
        </div>
        <p id="controls-hint">Click a gem, then click a neighbour to swap</p>
    </div>
    <script src="game.js"></script>
</body>
</html>
