<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect Four</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container">
        <h1>Connect Four</h1>
        <p id="status">Red to move</p>
        <div id="canvas-wrapper">
            <canvas id="canvas" width="560" height="480"></canvas>
        </div>
        <div id="scoreboard">
            <span class="chip red">Red <strong id="red-wins">0</strong></span>
            <span class="chip draw">Draws <strong id="draws">0</strong></span>
            <span class="chip yellow">Yellow <strong id="yellow-wins">0</strong></span>
        </div>
        <div id="controls">
            <button id="btn-new">New Game</button>
        </div>
        <p id="controls-hint">Click a column or press 1–7 to drop &nbsp;·&nbsp; R for a new game</p>
    </div>
    <script src="game.js"></script>
</body>
</html>
