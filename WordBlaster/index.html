<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Blaster</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container">
        <h1>Word Blaster</h1>
        <div id="hud">
            <span>Score: <strong id="score">0</strong></span>
            <span>Best: <strong id="best">0</strong></span>
            <span>Lives: <strong id="lives">3</strong></span>
        </div>
        <div id="canvas-wrapper">
            <canvas id="canvas" width="700" height="560"></canvas>
            <div id="overlay" class="visible">
                <p id="overlay-title">Word Blaster</p>
                <p id="overlay-score"></p>
                <p id="overlay-sub">Type the falling words. Press any letter to start</p>
                <button id="btn-start">Start Game</button>
            </div>
        </div>
        <p id="controls-hint">Type the letters of a falling word to blast it &nbsp;·&nbsp; Esc to pause</p>
    </div>
    <script src="game.js"></script>
</body>
</html>
