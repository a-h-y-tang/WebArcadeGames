<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bomberman</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container">
        <h1>Bomberman</h1>
        <div id="hud">
            <span>Score: <strong id="score">0</strong></span>
            <span>Best: <strong id="best">0</strong></span>
            <span>Lives: <strong id="lives">3</strong></span>
            <span>Level: <strong id="level">1</strong></span>
            <span>Enemies: <strong id="enemies">0</strong></span>
        </div>
        <div id="canvas-wrapper">
            <canvas id="canvas" width="520" height="440"></canvas>
            <div id="overlay" class="visible">
                <p id="overlay-title">Bomberman</p>
                <p id="overlay-score"></p>
                <p id="overlay-sub">Press Space or an arrow key to start</p>
                <button id="btn-start">Start Game</button>
            </div>
        </div>
        <p id="controls-hint">Arrows / WASD move &nbsp;·&nbsp; Space drops a bomb &nbsp;·&nbsp; P to pause</p>
    </div>
    <script src="game.js"></script>
</body>
</html>
