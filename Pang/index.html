<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pang</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container">
        <h1>Pang</h1>
        <div id="hud">
            <span>Level: <strong id="level">1</strong></span>
            <span>Score: <strong id="score">0</strong></span>
            <span>Lives: <strong id="lives">3</strong></span>
        </div>
        <div id="canvas-wrapper">
            <canvas id="canvas" width="640" height="480"></canvas>
            <div id="overlay" class="visible">
                <p id="overlay-title">Pang</p>
                <p id="overlay-sub">Pop every bouncing ball with your harpoon · big balls split in two</p>
                <button id="btn-start">Start Game</button>
            </div>
        </div>
        <div id="buttons">
            <button id="btn-reset">Reset (R)</button>
        </div>
        <p id="controls-hint">
            &#8592;/&#8594; or A/D move &nbsp;·&nbsp; Space / &#8593; fire &nbsp;·&nbsp; P pause &nbsp;·&nbsp; R reset
        </p>
    </div>
    <script src="game.js"></script>
</body>
</html>
