<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Columns</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container">
        <h1>Columns</h1>
        <div id="hud">
            <span>Score: <strong id="score">0</strong></span>
            <span>Level: <strong id="level">1</strong></span>
            <span>Best: <strong id="best">0</strong></span>
        </div>
        <div id="canvas-wrapper">
            <canvas id="canvas" width="240" height="560"></canvas>
            <div id="overlay" class="visible">
                <p id="overlay-title">Columns</p>
                <p id="overlay-score"></p>
                <p id="overlay-sub">Press Space or an arrow key to start</p>
                <button id="btn-start">Start Game</button>
            </div>
        </div>
        <p id="controls-hint">← → / A D move &nbsp;·&nbsp; ↑ / W cycle colours &nbsp;·&nbsp; ↓ / S drop &nbsp;·&nbsp; P pause</p>
    </div>
    <script src="game.js"></script>
</body>
</html>
