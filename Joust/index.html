<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joust</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container">
        <h1>Joust</h1>
        <div id="hud">
            <span>Score: <strong id="score">0</strong></span>
            <span>Wave: <strong id="wave">1</strong></span>
            <span>Lives: <strong id="lives">3</strong></span>
            <span>Best: <strong id="best">0</strong></span>
        </div>
        <div id="canvas-wrapper">
            <canvas id="canvas" width="700" height="500"></canvas>
            <div id="overlay" class="visible">
                <p id="overlay-title">Joust</p>
                <p id="overlay-score"></p>
                <p id="overlay-sub">Press Space or an arrow key to start</p>
                <button id="btn-start">Start Game</button>
            </div>
        </div>
        <p id="controls-hint">Space / ↑ / W to flap &nbsp;·&nbsp; ← → / A D to steer &nbsp;·&nbsp; joust from above &nbsp;·&nbsp; P to pause</p>
    </div>
    <script src="game.js"></script>
</body>
</html>
