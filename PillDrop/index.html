<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pill Drop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container">
        <h1>Pill Drop</h1>
        <div id="hud">
            <span>Score: <strong id="score">0</strong></span>
            <span>Best: <strong id="best">0</strong></span>
            <span>Level: <strong id="level">1</strong></span>
            <span>Viruses: <strong id="viruses">0</strong></span>
        </div>
        <div id="canvas-wrapper">
            <canvas id="canvas" width="240" height="480"></canvas>
            <div id="overlay" class="visible">
                <p id="overlay-title">Pill Drop</p>
                <p id="overlay-score"></p>
                <p id="overlay-sub">Press Space or Start to play</p>
                <button id="btn-start">Start Game</button>
            </div>
        </div>
        <p id="controls-hint">
            ← → move &nbsp;·&nbsp; ↑ / X rotate &nbsp;·&nbsp; ↓ soft drop &nbsp;·&nbsp;
            Space hard drop &nbsp;·&nbsp; match 4+ to clear viruses
        </p>
    </div>
    <script src="game.js"></script>
</body>
</html>
