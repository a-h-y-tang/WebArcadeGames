<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaboom!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container">
        <h1>Kaboom!</h1>
        <div id="hud">
            <span>Score: <strong id="score">0</strong></span>
            <span>Wave: <strong id="wave">1</strong></span>
            <span>Buckets: <strong id="buckets">3</strong></span>
            <span>Best: <strong id="best">0</strong></span>
        </div>
        <div id="canvas-wrapper">
            <canvas id="canvas" width="480" height="640"></canvas>
            <div id="overlay" class="visible">
                <p id="overlay-title">Kaboom!</p>
                <p id="overlay-score"></p>
                <p id="overlay-sub">Slide the buckets to catch every falling bomb</p>
                <button id="btn-start">Start Game</button>
            </div>
        </div>
        <p id="controls-hint">← → or A / D to move &middot; Mouse to aim &middot; Space to start</p>
    </div>
    <script src="game.js"></script>
</body>
</html>
