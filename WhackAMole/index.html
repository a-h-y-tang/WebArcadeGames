<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whack-a-Mole</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container">
        <h1>Whack-a-Mole</h1>
        <div id="hud">
            <span>Score: <strong id="score">0</strong></span>
            <span>Best: <strong id="best">0</strong></span>
            <span>Time: <strong id="time">30</strong></span>
            <span>Level: <strong id="level">1</strong></span>
        </div>
        <div id="canvas-wrapper">
            <canvas id="canvas" width="500" height="500"></canvas>
            <div id="overlay" class="visible">
                <p id="overlay-title">Whack-a-Mole</p>
                <p id="overlay-score"></p>
                <p id="overlay-sub">Press Space to start</p>
                <button id="btn-start">Start Game</button>
            </div>
        </div>
        <p id="controls-hint">Click a hole or press 1–9 to whack &nbsp;·&nbsp; Space to start &nbsp;·&nbsp; P to pause</p>
    </div>
    <script src="game.js"></script>
</body>
</html>
