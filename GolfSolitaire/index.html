<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golf Solitaire</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container">
        <h1>Golf Solitaire</h1>
        <div id="hud">
            <span>Cleared: <strong id="score">0</strong> / 35</span>
            <span>Best: <strong id="best">0</strong></span>
        </div>
        <div id="canvas-wrapper">
            <canvas id="canvas" width="720" height="520"></canvas>
            <div id="overlay" class="visible">
                <p id="overlay-title">Golf Solitaire</p>
                <p id="overlay-score"></p>
                <p id="overlay-sub">Clear the columns by playing a card that is one rank higher or lower than the foundation. Flip the stock when you're stuck.</p>
                <button id="btn-start">Start Game</button>
            </div>
        </div>
        <p id="controls-hint">Click a column to play its bottom card &nbsp;·&nbsp; click the stock or press Space to flip &nbsp;·&nbsp; N for a new deal</p>
    </div>
    <script src="game.js"></script>
</body>
</html>
