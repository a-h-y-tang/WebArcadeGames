<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xonix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container">
        <h1>Xonix</h1>
        <div id="hud">
            <span>Claimed: <strong id="percent">0</strong>% / <strong id="target">75</strong>%</span>
            <span>Lives: <strong id="lives">3</strong></span>
            <span>Score: <strong id="score">0</strong></span>
            <span>Best: <strong id="best">0</strong></span>
        </div>
        <div id="canvas-wrapper">
            <canvas id="canvas" width="600" height="450"></canvas>
            <div id="overlay" class="visible">
                <p id="overlay-title">Xonix</p>
                <p id="overlay-score"></p>
                <p id="overlay-sub">Carve out the sea into land — don't let the drones touch your trail!</p>
                <button id="btn-start">Start Game</button>
            </div>
        </div>
        <p id="controls-hint">Arrow keys / WASD to move &nbsp;·&nbsp; R restart &nbsp;·&nbsp; P pause</p>
    </div>
    <script src="game.js"></script>
</body>
</html>
