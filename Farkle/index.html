<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farkle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container">
        <h1>Farkle</h1>
        <p id="subtitle">Push your luck · race to <span id="target">10000</span></p>
        <div id="hud">
            <span>Total: <strong id="total">0</strong></span>
            <span>Turn: <strong id="turn-score">0</strong></span>
            <span>Turn #<strong id="turn-number">0</strong></span>
            <span>Best: <strong id="best">—</strong></span>
        </div>
        <div id="canvas-wrapper">
            <canvas id="canvas" width="520" height="150"></canvas>
            <div id="overlay" class="visible">
                <p id="overlay-title">Farkle</p>
                <p id="overlay-sub">Reach 10,000 points in as few turns as you can.</p>
                <button id="btn-start">Start Game</button>
            </div>
        </div>
        <p id="message">Press Start to play.</p>
        <div id="controls">
            <button id="btn-roll" disabled>Roll</button>
            <button id="btn-setaside" disabled>Set Aside</button>
            <button id="btn-bank" disabled>Bank</button>
        </div>
        <p id="controls-hint">R / Space roll &nbsp;·&nbsp; click die or 1–6 to select &nbsp;·&nbsp; A set aside &nbsp;·&nbsp; B bank</p>
    </div>
    <script src="game.js"></script>
</body>
</html>
