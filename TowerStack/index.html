<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tower Stack</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container">
        <h1>Tower Stack</h1>
        <div id="hud">
            <span>Score: <strong id="score">0</strong></span>
            <span>Best: <strong id="best">0</strong></span>
        </div>
        <div id="canvas-wrapper">
            <canvas id="canvas" width="400" height="600"></canvas>
            <div id="overlay" class="visible">
                <p id="overlay-title">Tower Stack</p>
                <p id="overlay-score"></p>
                <p id="overlay-sub">Press space (or tap) to drop the block</p>
                <button id="btn-start">Start Game</button>
            </div>
        </div>
        <p id="controls-hint">Space / click / tap to drop &nbsp;·&nbsp; stack as high as you can</p>
    </div>
    <script src="game.js"></script>
</body>
</html>
