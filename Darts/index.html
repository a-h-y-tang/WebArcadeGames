<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Darts</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container">
        <h1>Darts <span class="sub">501</span></h1>
        <div id="hud">
            <span>Remaining: <strong id="remaining">501</strong></span>
            <span>Darts: <strong id="darts">0</strong></span>
            <span>Best: <strong id="best">—</strong></span>
        </div>
        <div id="canvas-wrapper">
            <canvas id="canvas" width="500" height="500"></canvas>
            <div id="overlay" class="visible">
                <p id="overlay-title">Darts 501</p>
                <p id="overlay-score"></p>
                <p id="overlay-sub">Press Space or click Start to play</p>
                <button id="btn-start">Start Game</button>
            </div>
        </div>
        <p id="turn-hint">This turn: <span id="turn-darts">—</span></p>
        <p id="controls-hint">Space: lock aim / throw &nbsp;·&nbsp; or click the board &nbsp;·&nbsp; finish on a double</p>
    </div>
    <script src="game.js"></script>
</body>
</html>
