<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumberjack</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container">
        <h1>Lumberjack</h1>
        <div id="hud">
            <span>Score: <strong id="score">0</strong></span>
            <span>Best: <strong id="best">0</strong></span>
        </div>
        <div id="canvas-wrapper">
            <canvas id="canvas" width="400" height="600"></canvas>
            <div id="overlay" class="visible">
                <p id="overlay-title">Lumberjack</p>
                <p id="overlay-score"></p>
                <p id="overlay-sub">Press ← / → to chop &nbsp;·&nbsp; dodge the branches!</p>
                <button id="btn-start">Start Game</button>
            </div>
        </div>
        <p id="controls-hint">← / A &nbsp;·&nbsp; → / D &nbsp;·&nbsp; or tap a side to chop</p>
    </div>
    <script src="game.js"></script>
</body>
</html>
