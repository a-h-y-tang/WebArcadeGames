<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klondike Solitaire</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container">
        <h1>Klondike Solitaire</h1>
        <div id="hud">
            <span>Moves: <strong id="moves">0</strong></span>
            <span>Best: <strong id="best">–</strong></span>
        </div>
        <div id="canvas-wrapper">
            <canvas id="canvas" width="820" height="700"></canvas>
            <div id="overlay" class="visible">
                <p id="overlay-title">Klondike Solitaire</p>
                <p id="overlay-sub">Build all four foundations from Ace to King. Click the deck to draw; click a card, then a pile, to move it.</p>
                <button id="btn-start">Deal Cards</button>
            </div>
        </div>
        <div id="buttons">
            <button id="btn-new">New Game (N)</button>
        </div>
        <p id="controls-hint">
            Click the stock to draw &nbsp;·&nbsp; click a card then a destination to move &nbsp;·&nbsp;
            double-click to send to a foundation &nbsp;·&nbsp; <kbd>N</kbd> new game
        </p>
    </div>
    <script src="game.js"></script>
</body>
</html>
