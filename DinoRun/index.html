<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dino Run</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="game">
        <header class="hud">
            <h1>DINO&nbsp;RUN</h1>
            <div class="stats">
                <div class="stat"><span class="label">Score</span><span id="score">0</span></div>
                <div class="stat"><span class="label">Best</span><span id="best">0</span></div>
            </div>
        </header>

        <div class="board-wrap">
            <canvas id="canvas" width="600" height="200"></canvas>
            <div id="overlay" class="overlay visible">
                <h2 id="overlay-title">DINO RUN</h2>
                <p id="overlay-score"></p>
                <p id="overlay-sub">Press Space to jump and start</p>
                <button id="btn-start">Start Game</button>
            </div>
        </div>

        <div class="help">
            <p><kbd>Space</kbd> / <kbd>↑</kbd> jump</p>
            <p><kbd>↓</kbd> duck</p>
            <p><kbd>P</kbd> pause</p>
        </div>
    </main>

    <script src="game.js"></script>
</body>
</html>
