<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skeet Shooter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container">
        <h1>Skeet Shooter</h1>
        <div id="hud">
            <span>Score: <strong id="score">0</strong></span>
            <span>Best: <strong id="best">0</strong></span>
            <span>Misses: <strong id="misses">0</strong>/5</span>
        </div>
        <div id="canvas-wrapper">
            <canvas id="canvas" width="700" height="500"></canvas>
            <div id="overlay" class="visible">
                <p id="overlay-title">Skeet Shooter</p>
                <p id="overlay-score"></p>
                <p id="overlay-sub">Move the mouse to aim · click to shoot the clays · 5 misses and you're out</p>
                <button id="btn-start">Start Game</button>
            </div>
        </div>
        <p id="controls-hint">Move to aim &nbsp;·&nbsp; click to shoot &nbsp;·&nbsp; P to pause</p>
    </div>
    <script src="game.js"></script>
</body>
</html>
