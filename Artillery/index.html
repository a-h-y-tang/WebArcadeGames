<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artillery Duel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container">
        <h1>Artillery Duel</h1>
        <div id="hud">
            <span class="hud-item">Turn: <strong id="turn" class="p0">Blue</strong></span>
            <span class="hud-item">Angle: <strong id="angle">45</strong>°</span>
            <span class="hud-item">Power: <strong id="power">55</strong></span>
            <span class="hud-item">Wind: <strong id="wind">· 0</strong></span>
            <span class="hud-item score s0">Blue <strong id="score0">0</strong></span>
            <span class="hud-item score s1">Red <strong id="score1">0</strong></span>
        </div>
        <div id="canvas-wrapper">
            <canvas id="canvas" width="800" height="500"></canvas>
            <div id="overlay" class="visible">
                <p id="overlay-title">Artillery Duel</p>
                <p id="overlay-sub">Press Space to begin the duel</p>
                <button id="btn-start">Start Duel</button>
            </div>
        </div>
        <p id="controls-hint">
            ← → aim angle &nbsp;·&nbsp; ↑ ↓ power &nbsp;·&nbsp; Space fire &nbsp;·&nbsp; N new game
        </p>
    </div>
    <script src="game.js"></script>
</body>
</html>
