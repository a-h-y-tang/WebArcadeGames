<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Match</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container">
        <h1>Memory Match</h1>
        <div id="hud">
            <span>Moves: <strong id="moves">0</strong></span>
            <span>Pairs: <strong id="pairs">0/8</strong></span>
            <span>Time: <strong id="time">0s</strong></span>
            <span>Best: <strong id="best">—</strong></span>
        </div>
        <div id="canvas-wrapper">
            <canvas id="canvas" width="500" height="500"></canvas>
            <div id="overlay" class="visible">
                <p id="overlay-title">Memory Match</p>
                <p id="overlay-score"></p>
                <p id="overlay-sub">Press Space or Enter to start</p>
                <button id="btn-start">Start Game</button>
            </div>
        </div>
        <p id="controls-hint">Click a card, or use ← ↑ → ↓ and Enter &nbsp;·&nbsp; find all 8 pairs &nbsp;·&nbsp; P to pause</p>
    </div>
    <script src="game.js"></script>
</body>
</html>
