<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match-3</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container">
        <h1>Match-3</h1>
        <div id="hud">
            <span>Score: <strong id="score">0</strong></span>
            <span>Best: <strong id="best">0</strong></span>
            <span>Moves: <strong id="moves">20</strong></span>
        </div>
        <div id="canvas-wrapper">
            <canvas id="canvas" width="480" height="480"></canvas>
            <div id="overlay" class="visible">
                <p id="overlay-title">Match-3</p>
                <p id="overlay-score"></p>
                <p id="overlay-sub">Press Space or Start to play</p>
                <button id="btn-start">Start Game</button>
            </div>
        </div>
        <p id="controls-hint">Click a gem, then an adjacent one to swap &nbsp;·&nbsp; match 3+ &nbsp;·&nbsp; Space to start</p>
    </div>
    <script src="game.js"></script>
</body>
</html>
