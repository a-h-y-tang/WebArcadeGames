<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artillery Duel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container">
        <h1>Artillery Duel</h1>
        <div id="hud">
            <span>Score: <strong id="score">0</strong></span>
            <span>Best: <strong id="best">0</strong></span>
            <span>Round: <strong id="round">1</strong></span>
        </div>
        <div id="readout">
            <span>Angle: <strong id="angle-out">45°</strong></span>
            <span>Power: <strong id="power-out">55</strong></span>
            <span>Wind: <strong id="wind-out">—</strong></span>
            <span id="turn-out">Your shot</span>
        </div>
        <div id="canvas-wrapper">
            <canvas id="canvas" width="500" height="500"></canvas>
            <div id="overlay" class="visible">
                <p id="overlay-title">Artillery Duel</p>
                <p id="overlay-score"></p>
                <p id="overlay-sub">Press Space or an arrow key to start</p>
                <button id="btn-start">Start Game</button>
            </div>
        </div>
        <p id="controls-hint">↑ ↓ angle &nbsp;·&nbsp; ← → power &nbsp;·&nbsp; Space fire &nbsp;·&nbsp; P pause</p>
    </div>
    <script src="game.js"></script>
</body>
</html>
