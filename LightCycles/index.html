<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Light Cycles</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container">
        <h1>Light Cycles</h1>
        <div id="hud">
            <span>You: <strong id="score-player">0</strong></span>
            <span>CPU: <strong id="score-cpu">0</strong></span>
            <span>Best Streak: <strong id="best">0</strong></span>
        </div>
        <div id="canvas-wrapper">
            <canvas id="canvas" width="600" height="600"></canvas>
            <div id="overlay" class="visible">
                <p id="overlay-title">Light Cycles</p>
                <p id="overlay-score"></p>
                <p id="overlay-sub">Use ↑ ↓ ← → (or WASD) to steer · first to 5 wins</p>
                <button id="btn-start">Start Game</button>
            </div>
        </div>
        <p id="controls-hint">↑ ↓ ← → / WASD to steer &nbsp;·&nbsp; P to pause</p>
    </div>
    <script src="game.js"></script>
</body>
</html>
