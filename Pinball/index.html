<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinball</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container">
        <h1>Pinball</h1>
        <div id="hud">
            <span>Score: <strong id="score">0</strong></span>
            <span>Balls: <strong id="balls">3</strong></span>
            <span>Best: <strong id="best">0</strong></span>
        </div>
        <div id="canvas-wrapper">
            <canvas id="canvas" width="400" height="620"></canvas>
            <div id="overlay" class="visible">
                <p id="overlay-title">Pinball</p>
                <p id="overlay-score"></p>
                <p id="overlay-sub">Press Space to launch, arrow keys to flip</p>
                <button id="btn-start">Start Game</button>
            </div>
        </div>
        <p id="status">Keep the ball alive and rack up points</p>
        <p id="controls-hint">Space / Up: launch &nbsp;·&nbsp; Left (Z/A) &amp; Right (/ or L): flippers</p>
    </div>
    <script src="game.js"></script>
</body>
</html>
