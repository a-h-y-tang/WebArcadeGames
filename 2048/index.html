<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container">
        <h1>2048</h1>
        <div id="hud">
            <span>Score: <strong id="score">0</strong></span>
            <span>Best: <strong id="best">0</strong></span>
        </div>
        <div id="canvas-wrapper">
            <canvas id="canvas" width="400" height="400"></canvas>
            <div id="overlay" class="visible">
                <p id="overlay-title">2048</p>
                <p id="overlay-score"></p>
                <p id="overlay-sub">Press any arrow key to start</p>
                <button id="btn-start">Start Game</button>
            </div>
        </div>
        <p id="controls-hint">Arrow keys / WASD &nbsp;·&nbsp; Join tiles to reach 2048</p>
    </div>
    <script src="game.js"></script>
</body>
</html>
