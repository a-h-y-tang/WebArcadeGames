<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flow</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container">
        <h1>Flow</h1>
        <div id="hud">
            <span>Flows: <strong id="flows">0 / 0</strong></span>
            <span>Moves: <strong id="moves">0</strong></span>
            <span>Best: <strong id="best">—</strong></span>
        </div>
        <div id="levels"></div>
        <div id="canvas-wrapper">
            <canvas id="canvas" width="560" height="560"></canvas>
            <div id="overlay" class="visible">
                <p id="overlay-title">Flow</p>
                <p id="overlay-score"></p>
                <p id="overlay-sub">Connect each pair of dots and fill the whole board</p>
                <button id="btn-start">Start Game</button>
            </div>
        </div>
        <p id="controls-hint">Drag from a dot to connect its pair &nbsp;·&nbsp; R for restart &nbsp;·&nbsp; N for next level</p>
    </div>
    <script src="game.js"></script>
</body>
</html>
