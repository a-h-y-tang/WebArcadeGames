<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container">
        <h1>Simon</h1>
        <div id="hud">
            <span>Score: <strong id="score">0</strong></span>
            <span>Best: <strong id="best">0</strong></span>
        </div>
        <div id="canvas-wrapper">
            <canvas id="canvas" width="500" height="500"></canvas>
            <div id="overlay" class="visible">
                <p id="overlay-title">Simon</p>
                <p id="overlay-score"></p>
                <p id="overlay-sub">Press Space or Enter to start</p>
                <button id="btn-start">Start Game</button>
            </div>
        </div>
        <p id="controls-hint">Watch the pattern, then repeat it &nbsp;·&nbsp; click a pad or press 1–4</p>
    </div>
    <script src="game.js"></script>
</body>
</html>
