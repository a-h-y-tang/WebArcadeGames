<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tapper</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container">
        <h1>Tapper</h1>
        <div id="hud">
            <span>Score: <strong id="score">0</strong></span>
            <span>Best: <strong id="best">0</strong></span>
            <span>Lives: <strong id="lives">3</strong></span>
            <span>Wave: <strong id="wave">1</strong></span>
        </div>
        <div id="canvas-wrapper">
            <canvas id="canvas" width="480" height="640"></canvas>
            <div id="overlay" class="visible">
                <p id="overlay-title">Tapper</p>
                <p id="overlay-score"></p>
                <p id="overlay-sub">Serve root beer to every patron before they reach the counter!</p>
                <button id="btn-start">Start Game</button>
            </div>
        </div>
        <p id="controls-hint">↑ ↓ / W S change lane &nbsp;·&nbsp; Space / click to pour &nbsp;·&nbsp; P to pause</p>
    </div>
    <script src="game.js"></script>
</body>
</html>
