<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stacker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container">
        <h1>Stacker</h1>
        <div id="hud">
            <span>Blocks: <strong id="score">0</strong></span>
            <span>Best: <strong id="best">0</strong></span>
        </div>
        <div id="canvas-wrapper">
            <canvas id="canvas" width="480" height="640"></canvas>
            <div id="overlay" class="visible">
                <p id="overlay-title">Stacker</p>
                <p id="overlay-score"></p>
                <p id="overlay-sub">Tap or press Space to drop the block · line it up!</p>
                <button id="btn-start">Start Game</button>
            </div>
        </div>
        <p id="controls-hint">Space / ↓ / click to drop &nbsp;·&nbsp; P to pause</p>
    </div>
    <script src="game.js"></script>
</body>
</html>
