<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fruit Slice</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container">
        <h1>Fruit Slice</h1>
        <div id="hud">
            <span>Score: <strong id="score">0</strong></span>
            <span>Best: <strong id="best">0</strong></span>
            <span>Lives: <strong id="lives">3</strong></span>
        </div>
        <div id="canvas-wrapper">
            <canvas id="canvas" width="600" height="600"></canvas>
            <div id="overlay" class="visible">
                <p id="overlay-title">Fruit Slice</p>
                <p id="overlay-score"></p>
                <p id="overlay-sub">Drag to slice the fruit — avoid the bombs!</p>
                <button id="btn-start">Start Game</button>
            </div>
        </div>
        <p id="controls-hint">Drag to slice &nbsp;·&nbsp; Space to start &nbsp;·&nbsp; P to pause</p>
    </div>
    <script src="game.js"></script>
</body>
</html>
